[loggers]
keys=root,TransactionLogger,pslookup

[formatters]
keys=patternLayout,rootPatternLayout

[handlers]
keys=fileRotateTransaction,nullRoot,fileRotatePSLookup

[formatter_patternLayout]
format=%(asctime)s %(levelname)s %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_rootPatternLayout]
format=%(asctime)s %(levelname)s pid=%(process)d prog=%(funcName)s line=%(lineno)d %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[logger_root]
level=NOTSET
handlers=nullRoot

[logger_pslookup]
level=NOTSET
qualname=pslookup
handlers=fileRotatePSLookup

[logger_TransactionLogger]
level=INFO
qualname=TransactionLogger
handlers=fileRotateTransaction

[handler_nullRoot]
class=logging.NullHandler

[handler_fileRotatePSLookup]
class=handlers.RotatingFileHandler
level=INFO
formatter=rootPatternLayout
maxBytes=16777216
backupCount=7
args=('/var/log/perfsonar/pslookup-client-agent.log', 'a')

[handler_fileRotateTransaction]
class=handlers.RotatingFileHandler
level=DEBUG
formatter=patternLayout
maxBytes=16777216
backupCount=7
args=('/var/log/perfsonar/pslookup-client-agent-transactions.log', 'a')
